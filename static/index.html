<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hello, World — An Epic in Seven Acts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080808; color: #ccc; font-family: 'Courier New', monospace; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Curtain overlay ── */
    #curtain {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    #curtain.gone { opacity: 0; pointer-events: none; }
    #curtain-title {
      font-size: clamp(1rem, 5vw, 2rem);
      letter-spacing: 0.3em;
      color: #fff;
      text-align: center;
      line-height: 1.6;
    }
    #curtain-sub { font-size: clamp(0.6rem, 2vw, 0.85rem); color: #444; letter-spacing: 0.25em; }
    #curtain-btn {
      margin-top: 1rem;
      padding: 0.6rem 2.2rem;
      border: 1px solid #333;
      background: transparent;
      color: #666;
      font-family: monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    #curtain-btn:hover { border-color: #888; color: #ddd; }

    /* ── Header ── */
    header { flex-shrink: 0; text-align: center; padding: 0.55rem 1rem 0.35rem; }
    h1 { font-size: clamp(0.5rem, 2.2vw, 0.75rem); letter-spacing: 0.32em; color: #383838; text-transform: uppercase; }

    /* ── Terminal window ── */
    #terminal-wrap {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
      margin: 0 0.5rem;
      border: 1px solid #181818; border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.95);
    }
    .titlebar {
      flex-shrink: 0; background: #111; border-bottom: 1px solid #1a1a1a;
      padding: 0.42rem 0.8rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
    .titlebar-label { flex: 1; text-align: center; font-size: 0.62rem; color: #2e2e2e; letter-spacing: 0.08em; }
    #terminal-container { flex: 1; min-height: 0; background: #0d0d0d; padding: 2px; overflow: hidden; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      gap: 0.8rem; padding: 0.38rem 1rem; border-top: 1px solid #0f0f0f;
    }
    #status { font-size: 0.62rem; color: #2a2a2a; letter-spacing: 0.12em; }
    button {
      background: transparent; border: 1px solid #222; color: #444;
      padding: 0.22rem 0.75rem; font-family: monospace; font-size: 0.62rem;
      letter-spacing: 0.1em; cursor: pointer; border-radius: 4px;
      transition: border-color 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent;
    }
    button:hover, button:active { border-color: #555; color: #bbb; }

    /* ── Floating YouTube player ── */
    #player-wrap {
      position: fixed;
      bottom: 2.8rem;
      right: 0.6rem;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }
    #now-playing {
      font-size: 0.55rem;
      color: #3a3a3a;
      text-align: right;
      letter-spacing: 0.07em;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #yt-player { border-radius: 4px; overflow: hidden; opacity: 0.85; }
  </style>
</head>
<body>

<!-- ── Curtain ─────────────────────────────────────────────── -->
<div id="curtain" onclick="beginEpic()">
  <div id="curtain-title">HELLO, WORLD<br><span style="font-size:0.5em;color:#333;letter-spacing:0.4em">AN EPIC IN SEVEN ACTS</span></div>
  <div id="curtain-sub">13,800,000,000 years in the making</div>
  <button id="curtain-btn">▶ &nbsp; BEGIN</button>
</div>

<header><h1>Hello, World &mdash; An Epic in Seven Acts</h1></header>

<div id="terminal-wrap">
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="titlebar-label">main.py &mdash; python3</span>
  </div>
  <div id="terminal-container"><div id="terminal"></div></div>
</div>

<!-- Floating YouTube player (required visible per YouTube ToS) -->
<div id="player-wrap">
  <div id="now-playing"></div>
  <div id="yt-player"></div>
</div>

<footer>
  <span id="status">waiting…</span>
  <button id="btn-mute"  onclick="toggleMute()">♪ mute</button>
  <button id="btn-restart" style="display:none" onclick="restart()">↺ again</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  COUNTRY RADIO  (Willie Nelson, Johnny Cash & friends)
// ═══════════════════════════════════════════════════════════════

const SONGS = {
  void:       { id: 'JA644rSZX1A', title: 'Blue Eyes Crying in the Rain', artist: 'Willie Nelson'           },
  genesis:    { id: 'dBN86y30Ufc', title: 'On the Road Again',            artist: 'Willie Nelson'           },
  prophecy:   { id: 'jiMXK9eDrMY', title: 'The Man Comes Around',         artist: 'Johnny Cash'             },
  terror:     { id: '8AHCfZTRGiI', title: 'Hurt',                         artist: 'Johnny Cash'             },
  love:       { id: 'R7f189Z0v0Y', title: 'Always on My Mind',            artist: 'Willie Nelson'           },
  battle:     { id: 'wBjPAqmnvGA', title: 'The Devil Went Down to Georgia', artist: 'Charlie Daniels Band'  },
  miracle:    { id: 'Ufjv0SRZ-IY', title: "Mammas Don't Let Your Babies", artist: 'Willie Nelson & Waylon'  },
  revelation: { id: '5WyLhwYFgmk', title: 'Ring of Fire',                 artist: 'Johnny Cash'             },
};

class CountryBand {
  constructor() {
    this.player  = null;   // YT.Player instance
    this.ready   = false;  // API ready flag
    this.current = null;   // current theme key
    this.pending = null;   // theme queued before player ready
    this.textBuf = '';
    this.muted   = false;

    this.ACT_MAP = [
      [/ACT VII|REVELATION|HELLO.*WORLD/s,           'revelation'],
      [/ACT VI|THE MIRACLE|core dumped/,              'miracle'   ],
      [/ACT V|WAR OF NULL|BATTLE COMMENCES/,          'battle'    ],
      [/ACT IV|LOVE STORY|Sir Haitch|Lady Doubleyou/, 'love'      ],
      [/ACT III|THE TERROR|LORD SEGFAULT|DARK ARMY/,  'terror'    ],
      [/ACT II|PROPHECY|Ur-Namma|clay tablet/,        'prophecy'  ],
      [/ACT I|GENESIS|UNIVERSE BOOTSTRAPPING/,        'genesis'   ],
    ];

    // Inject YouTube IFrame API script once
    window.onYouTubeIframeAPIReady = () => this._onAPIReady();
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);

    // ── Instruments ───────────────────────────────────────────

  }

  _onAPIReady() {
    this.player = new YT.Player('yt-player', {
      width: '200', height: '113',
      videoId: SONGS.void.id,
      playerVars: { autoplay: 0, controls: 1, rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onReady: () => {
          this.ready = true;
          if (this.pending) { this._play(this.pending); this.pending = null; }
        },
        onStateChange: (e) => {
          // Loop: restart when the song ends
          if (e.data === YT.PlayerState.ENDED) {
            this.player.seekTo(0); this.player.playVideo();
          }
        },
      },
    });
  }

  start() { this._switch('void'); }

  stop() {
    if (this.ready) this.player.stopVideo();
    this.current = null;
  }

  feed(raw) {
    const clean = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/[^\x20-\x7e\n]/g,'');
    this.textBuf = (this.textBuf + clean).slice(-600);
    for (const [re, theme] of this.ACT_MAP) {
      if (re.test(this.textBuf)) { this._switch(theme); break; }
    }
  }

  setMuted(v) {
    this.muted = v;
    if (!this.ready) return;
    v ? this.player.mute() : this.player.unMute();
  }

  _switch(name) {
    if (name === this.current) return;
    this.current = name;
    this._updateLabel(name);
    if (!this.ready) { this.pending = name; return; }
    this._play(name);
  }

  _play(name) {
    const song = SONGS[name];
    if (!song) return;
    this.player.loadVideoById(song.id);
    if (this.muted) this.player.mute();
  }

  _updateLabel(name) {
    const song = SONGS[name];
    const el = document.getElementById('now-playing');
    if (el && song) el.textContent = `♪  ${song.artist} — ${song.title}`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  TERMINAL
// ═══════════════════════════════════════════════════════════════

function pickFontSize() {
  const w = window.innerWidth;
  if (w < 400) return 9; if (w < 600) return 10; if (w < 900) return 11; return 13;
}

const term = new Terminal({
  theme: {
    background:'#0d0d0d', foreground:'#d0d0d0', cursor:'#ffffff',
    black:'#1a1a1a',  brightBlack:'#555555',
    red:'#ff5f57',    brightRed:'#ff6e67',
    green:'#28c840',  brightGreen:'#5af78e',
    yellow:'#febc2e', brightYellow:'#ffea7f',
    blue:'#4a9eff',   brightBlue:'#6fc3ff',
    magenta:'#c678dd',brightMagenta:'#e89ef8',
    cyan:'#56b6c2',   brightCyan:'#8be9fd',
    white:'#d0d0d0',  brightWhite:'#ffffff',
  },
  fontFamily: '"Cascadia Code","Fira Code","JetBrains Mono","Courier New",monospace',
  fontSize: pickFontSize(),
  lineHeight: 1.2,
  cursorStyle: 'block', cursorBlink: true,
  scrollback: 10000, disableStdin: true, allowTransparency: false,
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));

function fit() { term.options.fontSize = pickFontSize(); fitAddon.fit(); }
fit();

// ═══════════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════════

const orchestra = new CountryBand();
const statusEl  = document.getElementById('status');
const btnMute   = document.getElementById('btn-mute');
const btnRestart= document.getElementById('btn-restart');
let ws = null;
let started = false;

function setStatus(txt, col) { statusEl.textContent = txt; statusEl.style.color = col || '#2a2a2a'; }

function sendResize() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
}

function connect() {
  btnRestart.style.display = 'none';
  term.reset();
  orchestra.textBuf = '';
  setStatus('connecting…');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';
  ws.onopen  = () => { setStatus('● running', '#28c840'); sendResize(); };
  ws.onmessage = e => {
    const bytes = new Uint8Array(e.data);
    term.write(bytes);
    orchestra.feed(new TextDecoder().decode(bytes));
  };
  ws.onclose = () => { setStatus('● fin', '#febc2e'); btnRestart.style.display = 'inline-block'; };
  ws.onerror = () => { setStatus('● error', '#ff5f57'); btnRestart.style.display = 'inline-block'; };
}

function beginEpic() {
  if (started) return;
  started = true;
  document.getElementById('curtain').classList.add('gone');
  orchestra.start();
  connect();
}

function restart() {
  if (ws) ws.close();
  fit();
  orchestra.stop();
  orchestra.textBuf = '';
  orchestra.start();
  connect();
}

function toggleMute() {
  const m = !orchestra.muted;
  orchestra.setMuted(m);
  btnMute.textContent = m ? '♪ unmute' : '♪ mute';
}

window.addEventListener('resize', () => { fit(); sendResize(); });
</script>
</body>
</html>
