<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hello, World — An Epic in Seven Acts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080808; color: #ccc; font-family: 'Courier New', monospace; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Curtain overlay ── */
    #curtain {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    #curtain.gone { opacity: 0; pointer-events: none; }
    #curtain-title {
      font-size: clamp(1rem, 5vw, 2rem);
      letter-spacing: 0.3em;
      color: #fff;
      text-align: center;
      line-height: 1.6;
    }
    #curtain-sub { font-size: clamp(0.6rem, 2vw, 0.85rem); color: #444; letter-spacing: 0.25em; }
    #curtain-btn {
      margin-top: 1rem;
      padding: 0.6rem 2.2rem;
      border: 1px solid #333;
      background: transparent;
      color: #666;
      font-family: monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    #curtain-btn:hover { border-color: #888; color: #ddd; }

    /* ── Header ── */
    header { flex-shrink: 0; text-align: center; padding: 0.55rem 1rem 0.35rem; }
    h1 { font-size: clamp(0.5rem, 2.2vw, 0.75rem); letter-spacing: 0.32em; color: #383838; text-transform: uppercase; }

    /* ── Terminal window ── */
    #terminal-wrap {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
      margin: 0 0.5rem;
      border: 1px solid #181818; border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.95);
    }
    .titlebar {
      flex-shrink: 0; background: #111; border-bottom: 1px solid #1a1a1a;
      padding: 0.42rem 0.8rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
    .titlebar-label { flex: 1; text-align: center; font-size: 0.62rem; color: #2e2e2e; letter-spacing: 0.08em; }
    #terminal-container { flex: 1; min-height: 0; background: #0d0d0d; padding: 2px; overflow: hidden; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      gap: 0.8rem; padding: 0.38rem 1rem; border-top: 1px solid #0f0f0f;
    }
    #status { font-size: 0.62rem; color: #2a2a2a; letter-spacing: 0.12em; }
    button {
      background: transparent; border: 1px solid #222; color: #444;
      padding: 0.22rem 0.75rem; font-family: monospace; font-size: 0.62rem;
      letter-spacing: 0.1em; cursor: pointer; border-radius: 4px;
      transition: border-color 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent;
    }
    button:hover, button:active { border-color: #555; color: #bbb; }
  </style>
</head>
<body>

<!-- ── Curtain ─────────────────────────────────────────────── -->
<div id="curtain" onclick="beginEpic()">
  <div id="curtain-title">HELLO, WORLD<br><span style="font-size:0.5em;color:#333;letter-spacing:0.4em">AN EPIC IN SEVEN ACTS</span></div>
  <div id="curtain-sub">13,800,000,000 years in the making</div>
  <button id="curtain-btn">▶ &nbsp; BEGIN</button>
</div>

<header><h1>Hello, World &mdash; An Epic in Seven Acts</h1></header>

<div id="terminal-wrap">
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="titlebar-label">main.py &mdash; python3</span>
  </div>
  <div id="terminal-container"><div id="terminal"></div></div>
</div>

<footer>
  <span id="status">waiting…</span>
  <button id="btn-mute"  onclick="toggleMute()">♪ mute</button>
  <button id="btn-restart" style="display:none" onclick="restart()">↺ again</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  COUNTRY BAND  (Willie Nelson & friends)
// ═══════════════════════════════════════════════════════════════

class CountryBand {
  constructor() {
    // Warm room reverb — honky-tonk, not a concert hall
    this.room  = new Tone.Reverb({ decay: 1.6, wet: 0.20 }).toDestination();
    this.plate = new Tone.Reverb({ decay: 2.8, wet: 0.14 }).toDestination();

    // ── Instruments ───────────────────────────────────────────

    // Acoustic/nylon guitar (Willie's "Trigger") — plucked triangle, fast decay
    this.guitar = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'triangle' },
      envelope:   { attack: 0.001, decay: 0.55, sustain: 0.06, release: 0.9 },
    }).connect(this.room);
    this.guitar.volume.value = -8;

    // Pedal steel — triangle with portamento slide
    this.steel = new Tone.Synth({
      oscillator: { type: 'triangle8' },
      envelope:   { attack: 0.07, decay: 1.1, sustain: 0.22, release: 2.2 },
      portamento: 0.14,
    }).connect(this.plate);
    this.steel.volume.value = -12;

    // Fiddle — sawtooth with vibrato LFO
    this.fiddleRaw = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sawtooth4' },
      envelope:   { attack: 0.09, decay: 0.1, sustain: 0.88, release: 0.45 },
    });
    this.vib = new Tone.Vibrato({ frequency: 5.2, depth: 0.09 }).connect(this.plate);
    this.fiddleRaw.connect(this.vib);
    this.fiddleRaw.volume.value = -16;

    // Upright bass — thumpy triangle, short sustain
    this.bass = new Tone.Synth({
      oscillator: { type: 'triangle' },
      envelope:   { attack: 0.02, decay: 0.38, sustain: 0.12, release: 0.35 },
    }).toDestination();
    this.bass.volume.value = -7;

    // Kick (softer than rock — more like a stomp box)
    this.kick = new Tone.MembraneSynth({ pitchDecay: 0.04, octaves: 5 }).toDestination();
    this.kick.volume.value = -5;

    // Brushed snare — pink noise, soft
    this.brush = new Tone.NoiseSynth({
      noise: { type: 'pink' },
      envelope: { attack: 0.001, decay: 0.13, sustain: 0, release: 0.09 },
    }).toDestination();
    this.brush.volume.value = -22;

    // ── State ─────────────────────────────────────────────────
    this.loops   = [];
    this.current = null;
    this.textBuf = '';
    this.muted   = false;

    this.ACT_MAP = [
      [/ACT VII|REVELATION|HELLO.*WORLD/s,        'revelation'],
      [/ACT VI|THE MIRACLE|core dumped/,           'miracle'   ],
      [/ACT V|WAR OF NULL|BATTLE COMMENCES/,       'battle'    ],
      [/ACT IV|LOVE STORY|Sir Haitch|Lady Doubleyou/, 'love'   ],
      [/ACT III|THE TERROR|LORD SEGFAULT|DARK ARMY/,  'terror' ],
      [/ACT II|PROPHECY|Ur-Namma|clay tablet/,     'prophecy'  ],
      [/ACT I|GENESIS|UNIVERSE BOOTSTRAPPING/,     'genesis'   ],
    ];
  }

  async start() { await Tone.start(); this._switch('void'); }

  stop() {
    this._clear(); Tone.Transport.stop(); Tone.Transport.cancel(); this.current = null;
  }

  feed(raw) {
    const clean = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/[^\x20-\x7e\n]/g,'');
    this.textBuf = (this.textBuf + clean).slice(-600);
    for (const [re, theme] of this.ACT_MAP) {
      if (re.test(this.textBuf)) { this._switch(theme); break; }
    }
  }

  setMuted(v) { this.muted = v; Tone.Destination.mute = v; }

  _switch(name) {
    if (name === this.current) return;
    this.current = name;
    this._clear();
    Tone.Transport.stop();
    Tone.Transport.cancel();
    Tone.Transport.timeSignature = 4;
    const map = { void:'_void', genesis:'_genesis', prophecy:'_prophecy', terror:'_terror',
                  love:'_love', battle:'_battle', miracle:'_miracle', revelation:'_revelation' };
    this[map[name] || '_void']();
    Tone.Transport.start();
  }

  _clear() {
    this.loops.forEach(l => { try { l.stop(0); l.dispose(); } catch(_){} });
    this.loops = [];
  }

  _seq(cb, pattern, sub) {
    const s = new Tone.Sequence(cb, pattern, sub); s.start(0); this.loops.push(s); return s;
  }
  _loop(cb, interval) {
    const l = new Tone.Loop(cb, interval); l.start(0); this.loops.push(l); return l;
  }

  // ══════════════════════════════════════════════════════════
  //  THEMES
  // ══════════════════════════════════════════════════════════

  // ── Void: Lone guitar on an empty road, 2am ────────────────
  _void() {
    Tone.Transport.bpm.value = 50;
    // Willie-style fingerpicking: alternating bass note / treble note on G
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n, '8n', t, 0.48); },
      ['G2','B3','D2','G3', 'G2','B3','D3','G3'], '8n');
    // Lonesome steel bend every 4 bars
    let i = 0;
    this._loop(t => {
      if (i++ % 4 === 0) this.steel.triggerAttackRelease('D5', '2n', t, 0.28);
    }, '1m');
  }

  // ── Genesis: Country shuffle waking up, G major ────────────
  _genesis() {
    Tone.Transport.bpm.value = 112;
    // Boom-chick bass (root on 1&3, chord on 2&4)
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n, '8n', t, 0.78); },
      ['G2',null,'D2',null, 'G2',null,'C2',null], '4n');
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n, '16n', t, 0.55); },
      [null,['G3','B3','D4'],null,['G3','B3','D4'],
       null,['C3','E3','G3'],null,['C3','E3','G3']], '4n');
    // Kick on 1&3, brush on 2&4
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,0.78); },
      [0.78,0,0,0, 0.78,0,0,0], '4n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.5); },
      [null,0.5,null,0.5], '4n');
    // Steel guitar colour note
    let j = 0;
    this._loop(t => {
      if (j++ % 2 === 0) this.steel.triggerAttackRelease('B4','2n',t,0.28);
    }, '2m');
  }

  // ── Prophecy: Dark story-song, Am — "dark night of the soul" ─
  _prophecy() {
    Tone.Transport.bpm.value = 66;
    // Am - G - F - E  (classic dark country storytelling)
    const ch = [
      ['A2','E3','A3','C4'], ['G2','D3','G3','B3'],
      ['F2','C3','F3','A3'], ['E2','B2','E3','G#3'],
    ];
    let k = 0;
    this._loop(t => { this.guitar.triggerAttackRelease(ch[k++ % 4],'2n',t,0.42); }, '2n');
    // Fiddle telling the tale
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'4n',t,0.48); },
      ['A4',null,'C5','B4', 'G4','A4',null,'E4',
       'F4','E4','D4','C4', 'B3',null,null,null], '4n');
    // Walking bass
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'4n',t,0.62); },
      ['A2','G2','F2','E2'], '2n');
  }

  // ── Terror: Dark honky-tonk showdown, Dm ──────────────────
  _terror() {
    Tone.Transport.bpm.value = 128;
    // Driving minor bass — chromatic menace
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'8n',t,0.88); },
      ['D2','A2','F2','A2', 'Bb1','F2','C2','A1',
       'D2','C#2','C2','B1','Bb1','A1','Ab1',null], '8n');
    // Tense guitar chops
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n,'16n',t,0.72); },
      [['D3','F3','A3'],null,null,null,
       ['Bb2','D3','F3'],null,['A2','C#3','E3'],null,
       ['D3','F3','A3'],['D3','F3','A3'],null,null,
       ['G2','Bb2','D3'],null,null,null], '8n');
    // Kick and brush — tense pattern
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,n); },
      [0.88,0,0,0.44, 0.88,0,0,0, 0.88,0,0.5,0, 0.88,0,0,0.44], '8n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.6); },
      [null,null,0.7,null, null,0.4,0.7,null], '8n');
    // Steel guitar chromatic slide — ominous
    this._seq((t, n) => { if (n) this.steel.triggerAttackRelease(n,'4n',t,0.55); },
      ['D5','C#5','C5','B4', null,'Bb4',null,null], '8n');
    // Fiddle tremolo
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'16n',t,0.32); },
      ['D5','D5','Eb5','D5', 'C5','D5','Eb5','D5'], '8n');
  }

  // ── Love: 3/4 country waltz — "Always on My Mind" feel ────
  _love() {
    Tone.Transport.bpm.value = 76;
    Tone.Transport.timeSignature = 3;
    // Waltz bass: ONE – – (root on 1, chord on 2&3)
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'8n',t,0.68); },
      ['G2',null,null, 'D2',null,null], '4n');
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n,'16n',t,0.42); },
      [null,['G3','B3','D4'],['G3','B3','D4']], '4n');
    // Fiddle sweeping melody
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'4n',t,0.55); },
      ['G4','B4','D5', 'G5','F#5','E5',
       'D5','B4','A4', 'G4',null,null], '4n');
    // Steel fills on bar ends
    let lv = 0;
    this._loop(t => {
      if (lv++ % 4 === 3) this.steel.triggerAttackRelease('B4','4n',t,0.38);
    }, '4n');
    // Kick on 1 only
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,0.65); },
      [0.65,null,null], '4n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.4); },
      [null,0.4,0.4], '4n');
  }

  // ── Battle: Bluegrass hoedown at full tilt ─────────────────
  _battle() {
    Tone.Transport.bpm.value = 170;
    // Flat-picked guitar runs — G
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n,'16n',t,0.78); },
      ['G4','B4','D5','G5', 'F#5','E5','D5','B4',
       'C5','E5','G5','E5', 'D5','B4','G4','D4'], '8n');
    // Fiddle hoedown runs
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'16n',t,0.68); },
      ['D5','E5','F#5','G5','A5','G5','F#5','E5',
       'D5','C5','B4','A4','G4','A4','B4','C5'], '8n');
    // Driving bass run
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'8n',t,0.85); },
      ['G2','B2','D3','B2', 'C3','E3','G3','E3',
       'D3','F#3','A3','F#3','G2','B2','D3','G2'], '8n');
    // Steel — high lonesome wail between phrases
    let sv = 0;
    this._loop(t => {
      if (sv++ % 4 === 0) this.steel.triggerAttackRelease('G5','2n',t,0.42);
    }, '2m');
    // Stomp kick and brush
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,n); },
      [0.88,0,0.44,0, 0.88,0,0.44,0], '8n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.6); },
      [null,0.6,null,0.6], '4n');
  }

  // ── Miracle: Country resolution, D major, full warm band ──
  _miracle() {
    Tone.Transport.bpm.value = 88;
    // D - G - A - D  (classic resolution)
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'4n',t,0.75); },
      ['D2',null,'A2',null, 'G2',null,'A2',null], '4n');
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n,'16n',t,0.6); },
      [['D3','F#3','A3'],null,['D3','F#3','A3'],null,
       ['G3','B3','D4'],null,['A3','C#4','E4'],null], '8n');
    // Fiddle sings
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'4n',t,0.6); },
      ['D5','F#5','A5','F#5', 'E5','D5','B4','A4'], '4n');
    // Steel warm swell
    let mi = 0;
    this._loop(t => {
      const notes = [['D4','F#4'],['G4','B4'],['A4','C#5'],['D5','F#5']];
      this.steel.triggerAttackRelease(notes[mi++ % 4][0],'2n',t,0.38);
    }, '2n');
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,0.72); },
      [0.72,0,0,0, 0.72,0,0,0], '4n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.45); },
      [null,0.45,null,0.45], '4n');
  }

  // ── Revelation: Full band barn-dance, G major, everyone in ─
  _revelation() {
    Tone.Transport.bpm.value = 132;
    // All hands on deck
    this._seq((t, n) => { if (n) this.bass.triggerAttackRelease(n,'8n',t,0.9); },
      ['G2','D2','G2','B2', 'C2','G2','C3','E3',
       'D2','A2','D3','F#3','G2','D3','G3','B3'], '8n');
    this._seq((t, n) => { if (n) this.guitar.triggerAttackRelease(n,'16n',t,0.78); },
      [['G3','B3','D4'],null,['G3','B3','D4'],['G3','B3','D4'],
       ['C3','E3','G3'],null,['C3','E3','G3'],['C3','E3','G3'],
       ['D3','F#3','A3'],null,['D3','F#3','A3'],['D3','F#3','A3'],
       ['G3','B3','D4'],null,['G3','B3','D4'],null], '8n');
    // Fiddle celebration
    this._seq((t, n) => { if (n) this.fiddleRaw.triggerAttackRelease([n],'8n',t,0.72); },
      ['G5','F#5','E5','D5','B4','D5','G5',null,
       'A5','G5','F#5','E5','D5','E5','F#5','G5'], '8n');
    // Steel glory ride
    let ri = 0;
    this._loop(t => {
      const tops = ['G5','B5','D6','G5'];
      this.steel.triggerAttackRelease(tops[ri++ % 4],'2n',t,0.48);
    }, '2m');
    // Full stomp
    this._seq((t, n) => { if (n) this.kick.triggerAttackRelease('C1','16n',t,n); },
      [0.9,0,0.5,0, 0.9,0.5,0,0.45, 0.9,0,0.5,0, 0.9,0,0.5,0.4], '8n');
    this._seq((t, n) => { if (n) this.brush.triggerAttackRelease('8n',t,0.68); },
      [null,0.68,null,0.68], '4n');
  }
}

// ═══════════════════════════════════════════════════════════════
//  TERMINAL
// ═══════════════════════════════════════════════════════════════

function pickFontSize() {
  const w = window.innerWidth;
  if (w < 400) return 9; if (w < 600) return 10; if (w < 900) return 11; return 13;
}

const term = new Terminal({
  theme: {
    background:'#0d0d0d', foreground:'#d0d0d0', cursor:'#ffffff',
    black:'#1a1a1a',  brightBlack:'#555555',
    red:'#ff5f57',    brightRed:'#ff6e67',
    green:'#28c840',  brightGreen:'#5af78e',
    yellow:'#febc2e', brightYellow:'#ffea7f',
    blue:'#4a9eff',   brightBlue:'#6fc3ff',
    magenta:'#c678dd',brightMagenta:'#e89ef8',
    cyan:'#56b6c2',   brightCyan:'#8be9fd',
    white:'#d0d0d0',  brightWhite:'#ffffff',
  },
  fontFamily: '"Cascadia Code","Fira Code","JetBrains Mono","Courier New",monospace',
  fontSize: pickFontSize(),
  lineHeight: 1.2,
  cursorStyle: 'block', cursorBlink: true,
  scrollback: 10000, disableStdin: true, allowTransparency: false,
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));

function fit() { term.options.fontSize = pickFontSize(); fitAddon.fit(); }
fit();

// ═══════════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════════

const orchestra = new CountryBand();
const statusEl  = document.getElementById('status');
const btnMute   = document.getElementById('btn-mute');
const btnRestart= document.getElementById('btn-restart');
let ws = null;
let started = false;

function setStatus(txt, col) { statusEl.textContent = txt; statusEl.style.color = col || '#2a2a2a'; }

function sendResize() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
}

function connect() {
  btnRestart.style.display = 'none';
  term.reset();
  orchestra.textBuf = '';
  setStatus('connecting…');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';
  ws.onopen  = () => { setStatus('● running', '#28c840'); sendResize(); };
  ws.onmessage = e => {
    const bytes = new Uint8Array(e.data);
    term.write(bytes);
    orchestra.feed(new TextDecoder().decode(bytes));
  };
  ws.onclose = () => { setStatus('● fin', '#febc2e'); btnRestart.style.display = 'inline-block'; };
  ws.onerror = () => { setStatus('● error', '#ff5f57'); btnRestart.style.display = 'inline-block'; };
}

async function beginEpic() {
  if (started) return;
  started = true;
  const curtain = document.getElementById('curtain');
  curtain.classList.add('gone');
  await orchestra.start();
  connect();
}

function restart() {
  if (ws) ws.close();
  fit();
  orchestra.stop();
  orchestra.start();
  connect();
}

function toggleMute() {
  const m = !orchestra.muted;
  orchestra.setMuted(m);
  btnMute.textContent = m ? '♪ unmute' : '♪ mute';
}

window.addEventListener('resize', () => { fit(); sendResize(); });
</script>
</body>
</html>
